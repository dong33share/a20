<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ghép Avatar THPT Tăng Bạt Hổ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        font-family: Arial;
        background: #f2f2f2;
        text-align: center;
    }
    h1 { margin-top: 20px; }
    canvas {
        border: 2px dashed #aaa;
        margin-top: 15px;
        max-width: 100%;
    }
    .controls { margin-top: 15px; }
    button, input {
        margin: 5px;
        padding: 10px;
        font-size: 14px;
    }
</style>
</head>
<body>

<h1>GHÉP AVATAR - THPT TĂNG BẠT HỔ</h1>

<input type="file" id="upload">

<div class="controls">
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
    <button onclick="download()">Tải ảnh 4K</button>
</div>

<canvas id="canvas" width="1080" height="1080"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let userImg = new Image();
let frameImg = new Image();

let scale = 1;
let posX = 0;
let posY = 0;

let dragging = false;
let startX, startY;

frameImg.src = "frame.png";
frameImg.onload = draw;

document.getElementById("upload").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        userImg.src = event.target.result;
    };

    reader.readAsDataURL(file);
});

userImg.onload = function() {
    scale = 1;
    posX = canvas.width / 2;
    posY = canvas.height / 2;
    draw();
};

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (userImg.src) {
        const w = userImg.width * scale;
        const h = userImg.height * scale;
        ctx.drawImage(userImg, posX - w/2, posY - h/2, w, h);
    }

    ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
}

function zoomIn() { scale += 0.1; draw(); }
function zoomOut() { scale -= 0.1; draw(); }

canvas.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.offsetX - posX;
    startY = e.offsetY - posY;
});

canvas.addEventListener("mousemove", e => {
    if (dragging) {
        posX = e.offsetX - startX;
        posY = e.offsetY - startY;
        draw();
    }
});

canvas.addEventListener("mouseup", () => dragging = false);
canvas.addEventListener("mouseleave", () => dragging = false);

function download() {
    const exportCanvas = document.createElement("canvas");
    exportCanvas.width = 2160;
    exportCanvas.height = 2160;
    const ectx = exportCanvas.getContext("2d");

    const w = userImg.width * scale * 2;
    const h = userImg.height * scale * 2;

    ectx.drawImage(userImg, (posX - userImg.width/2)*2, (posY - userImg.height/2)*2, w, h);
    ectx.drawImage(frameImg, 0, 0, 2160, 2160);

    const link = document.createElement("a");
    link.download = "avatar-4k.png";
    link.href = exportCanvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
